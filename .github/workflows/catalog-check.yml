name: Catalog CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-catalog:
    name: Validate skill catalog
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: pip install -r scripts/requirements.txt

      - name: Validate catalog/skills.json against schema
        run: python3 scripts/validate_catalog.py

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            **/*.md
            !**/node_modules/**

  frontmatter-lint:
    name: Lint SKILL.md frontmatter
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Confirm every SKILL.md has required frontmatter
        run: |
          fail=0
          for f in $(find catalog -name SKILL.md); do
            if ! grep -q '^name:' "$f"; then echo "MISSING name: $f"; fail=1; fi
            if ! grep -q '^description:' "$f"; then echo "MISSING description: $f"; fail=1; fi
          done
          exit $fail
